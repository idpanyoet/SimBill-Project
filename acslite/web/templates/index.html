<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACS Dashboard</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { box-shadow: 0 2px 4px rgba(0,0,0,.08); background: linear-gradient(to right, #1a237e, #283593) !important; }
        .card { border: none; box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075); border-radius: 10px; }
        .card-header { background-color: white; border-bottom: 1px solid #eee; border-radius: 10px 10px 0 0 !important; }
        .table th { font-weight: 600; color: #555; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .table td { vertical-align: middle; font-size: 0.95rem; }
        .btn-group-sm > .btn { padding: 0.25rem 0.5rem; }
        .status-indicator { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .bg-gradient-success { background: linear-gradient(45deg, #2e7d32, #4caf50); }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark mb-4 py-3">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#"><i class="fas fa-network-wired me-2"></i>ACSLite Manager</a>
            <div class="d-flex align-items-center">
                 <div class="input-group input-group-sm me-3" style="max-width: 250px;">
                    <span class="input-group-text bg-white border-0"><i class="fas fa-key text-muted"></i></span>
                    <input type="password" id="api-key" class="form-control border-0" placeholder="API Key" onchange="saveApiKey(this.value)">
                </div>
                <button class="btn btn-light btn-sm rounded-pill px-3 fw-bold" onclick="loadData()">
                    <i class="fas fa-sync-alt me-1"></i> Refresh
                </button>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Stats Cards -->
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card text-white bg-gradient-success h-100">
                    <div class="card-body d-flex justify-content-between align-items-center p-4">
                        <div>
                            <h6 class="card-title mb-1 opacity-75">Online Devices (30m)</h6>
                            <h2 class="display-4 mb-0 fw-bold" id="online-count">0</h2>
                        </div>
                        <i class="fas fa-wifi fa-3x opacity-50"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Devices Table -->
        <div class="card">
            <div class="card-header py-3 d-flex justify-content-between align-items-center">
                <h5 class="mb-0 fw-bold text-primary"><i class="fas fa-list me-2"></i>Managed Devices</h5>
                <div class="d-flex align-items-center gap-2">
                    <select class="form-select form-select-sm" id="per-page-select" onchange="changePerPage(this.value)" style="width: auto;">
                        <option value="25">25 / page</option>
                        <option value="50">50 / page</option>
                        <option value="100">100 / page</option>
                        <option value="200">200 / page</option>
                        <option value="500">500 / page</option>
                        <option value="1000">1000 / page</option>
                    </select>
                    <span class="badge bg-light text-dark border" id="device-total">0 Devices</span>
                </div>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0" id="devices-table">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-4">Serial Number</th>
                                <th>Model</th>
                                <th>IP Address</th>
                                <th>SSID</th>
                                <th>PPPoE</th>
                                <th>Signal</th>
                                <th>Temp</th>
                                <th>Last Seen</th>
                                <th class="text-end pe-4">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td colspan="9" class="text-center py-5 text-muted">
                                    <div class="spinner-border text-primary mb-2" role="status"></div>
                                    <div>Loading devices...</div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="card-footer bg-white py-3">
                <nav aria-label="Device pagination" class="d-flex justify-content-between align-items-center">
                    <div class="text-muted small" id="pagination-info">Showing 0 to 0 of 0 entries</div>
                    <ul class="pagination pagination-sm mb-0">
                        <li class="page-item disabled" id="btn-prev">
                            <button class="page-link" onclick="changePage(-1)">Previous</button>
                        </li>
                        <li class="page-item disabled" id="btn-next">
                            <button class="page-link" onclick="changePage(1)">Next</button>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>

    <!-- WiFi Modal -->
    <div class="modal fade" id="wifiModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title"><i class="fas fa-wifi me-2"></i>Configure WiFi</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <input type="hidden" id="wifi-sn">
                    <input type="hidden" id="wifi-ssid-path">
                    <input type="hidden" id="wifi-pass-path">
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold text-secondary">SSID Name</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-broadcast-tower"></i></span>
                            <input type="text" class="form-control" id="wifi-ssid">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold text-secondary">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="text" class="form-control" id="wifi-pass" placeholder="Leave empty to keep current">
                        </div>
                        <div class="form-text mt-2"><i class="fas fa-info-circle me-1"></i>Enter a new password only if you want to change it.</div>
                    </div>
                </div>
                <div class="modal-footer bg-light">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary px-4" onclick="saveWifiConfig()">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Configuration
        const API_BASE = '/api';
        let wifiModal;
        
        // Pagination State
        let currentPage = 1;
        let itemsPerPage = 25;
        let totalItems = 0;

        document.addEventListener('DOMContentLoaded', () => {
            const savedKey = localStorage.getItem('acs_api_key');
            if (savedKey) {
                document.getElementById('api-key').value = savedKey;
            }
            wifiModal = new bootstrap.Modal(document.getElementById('wifiModal'));
            loadData();
        });

        function saveApiKey(key) {
            localStorage.setItem('acs_api_key', key);
        }

        function getHeaders() {
            const headers = {};
            const apiKey = document.getElementById('api-key').value;
            if (apiKey) {
                headers['X-API-Key'] = apiKey;
            }
            return headers;
        }

        function formatDate(dateString) {
            if (!dateString) return '-';
            const date = new Date(dateString);
            return date.toLocaleString();
        }

        // Helper to extract SSID
        function getSSID(device) {
            if (!device.wifi_services) return '-';
            for (const key in device.wifi_services) {
                const wifi = device.wifi_services[key];
                if (wifi.ssid_path && device.parameters && device.parameters[wifi.ssid_path]) {
                    return device.parameters[wifi.ssid_path];
                }
            }
            return '-';
        }

        // Helper to extract PPPoE Username
        function getPPPoE(device) {
            if (!device.wan_services) return '-';
            for (const key in device.wan_services) {
                const wan = device.wan_services[key];
                if (wan.username_path && device.parameters && device.parameters[wan.username_path]) {
                    return device.parameters[wan.username_path];
                }
            }
            return '-';
        }

        async function fetchStats() {
            try {
                const response = await fetch(`${API_BASE}/stats`, { headers: getHeaders() });
                if (!response.ok) throw new Error(`Status ${response.status}`);
                const data = await response.json();
                document.getElementById('online-count').textContent = data.online_devices;
            } catch (error) {
                console.error('Error fetching stats:', error);
                document.getElementById('online-count').textContent = '-';
            }
        }

        async function fetchDevices() {
            try {
                const response = await fetch(`${API_BASE}/devices?page=${currentPage}&per_page=${itemsPerPage}`, { headers: getHeaders() });
                if (!response.ok) throw new Error(`Status ${response.status} ${response.statusText}`);
                const result = await response.json();
                
                let devices = [];
                if (result.data && Array.isArray(result.data)) {
                    devices = result.data;
                    totalItems = result.meta ? result.meta.total : devices.length;
                } else if (Array.isArray(result)) {
                    devices = result;
                    totalItems = devices.length;
                }
                
                renderDevices(devices);
                updatePaginationUI();
            } catch (error) {
                console.error('Error fetching devices:', error);
                const tbody = document.querySelector('#devices-table tbody');
                tbody.innerHTML = `<tr><td colspan="9" class="text-center py-4 text-danger"><i class="fas fa-exclamation-triangle me-2"></i>Error loading devices: ${error.message}</td></tr>`;
            }
        }

        function updatePaginationUI() {
            document.getElementById('device-total').textContent = `${totalItems} Devices`;
            
            const start = (currentPage - 1) * itemsPerPage + 1;
            const end = Math.min(start + itemsPerPage - 1, totalItems);
            
            document.getElementById('pagination-info').textContent = 
                totalItems > 0 ? `Showing ${start} to ${end} of ${totalItems} entries` : 'No entries found';

            const totalPages = Math.ceil(totalItems / itemsPerPage);
            
            const btnPrev = document.getElementById('btn-prev');
            const btnNext = document.getElementById('btn-next');
            
            if (currentPage <= 1) btnPrev.classList.add('disabled');
            else btnPrev.classList.remove('disabled');
            
            if (currentPage >= totalPages) btnNext.classList.add('disabled');
            else btnNext.classList.remove('disabled');
        }

        function changePage(delta) {
            const totalPages = Math.ceil(totalItems / itemsPerPage);
            const newPage = currentPage + delta;
            
            if (newPage >= 1 && newPage <= totalPages) {
                currentPage = newPage;
                fetchDevices();
            }
        }

        function changePerPage(val) {
            itemsPerPage = parseInt(val);
            currentPage = 1; // Reset to first page
            fetchDevices();
        }

        function renderDevices(devices) {
            const tbody = document.querySelector('#devices-table tbody');
            tbody.innerHTML = '';

            if (!devices || devices.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" class="text-center py-5 text-muted"><i class="fas fa-inbox fa-2x mb-3 d-block"></i>No devices found</td></tr>';
                return;
            }

            devices.forEach(device => {
                const deviceJson = JSON.stringify(device).replace(/"/g, '&quot;');
                
                // Signal Color Logic
                let signalClass = 'text-muted';
                let rx = parseFloat(device.rx_power);
                if (!isNaN(rx)) {
                    if (rx > -20) signalClass = 'text-success';
                    else if (rx > -25) signalClass = 'text-warning';
                    else signalClass = 'text-danger';
                }

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="ps-4">
                        <div class="fw-bold text-dark">${device.serial_number}</div>
                        <small class="text-muted">${device.manufacturer || ''}</small>
                    </td>
                    <td><span class="badge bg-light text-secondary border">${device.product_class || '-'}</span></td>
                    <td><span class="font-monospace text-primary">${device.ip_address || '-'}</span></td>
                    <td><i class="fas fa-wifi text-muted me-1"></i>${getSSID(device)}</td>
                    <td>${getPPPoE(device)}</td>
                    <td class="${signalClass} fw-bold">${device.rx_power || '-'}</td>
                    <td>${device.temperature ? device.temperature + '°C' : '-'}</td>
                    <td><small class="text-muted">${formatDate(device.last_inform_time)}</small></td>
                    <td class="text-end pe-4">
                        <div class="btn-group btn-group-sm shadow-sm">
                            <button class="btn btn-outline-primary" onclick="refreshDevice('${device.serial_number}', this)" title="Refresh Connection">
                                <i class="fas fa-sync"></i>
                            </button>
                            <button class="btn btn-outline-info" onclick="openWifiModal('${device.serial_number}', ${deviceJson})" title="Configure WiFi">
                                <i class="fas fa-cog"></i>
                            </button>
                            <button class="btn btn-outline-danger" onclick="rebootDevice('${device.serial_number}')" title="Reboot Device">
                                <i class="fas fa-power-off"></i>
                            </button>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function openWifiModal(sn, device) {
            let ssidPath = '';
            let passPath = '';
            let currentSSID = '';

            if (device.wifi_services) {
                for (const key in device.wifi_services) {
                    const wifi = device.wifi_services[key];
                    if (wifi.ssid_path) {
                        ssidPath = wifi.ssid_path;
                        passPath = wifi.password_path;
                        if (device.parameters && device.parameters[ssidPath]) {
                            currentSSID = device.parameters[ssidPath];
                        }
                        break;
                    }
                }
            }

            if (!ssidPath) {
                alert('No WiFi service found for this device.');
                return;
            }

            document.getElementById('wifi-sn').value = sn;
            document.getElementById('wifi-ssid-path').value = ssidPath;
            document.getElementById('wifi-pass-path').value = passPath || '';
            document.getElementById('wifi-ssid').value = currentSSID;
            document.getElementById('wifi-pass').value = '';
            
            wifiModal.show();
        }

        async function saveWifiConfig() {
            const sn = document.getElementById('wifi-sn').value;
            const ssidPath = document.getElementById('wifi-ssid-path').value;
            const passPath = document.getElementById('wifi-pass-path').value;
            const newSSID = document.getElementById('wifi-ssid').value;
            const newPass = document.getElementById('wifi-pass').value;

            if (!newSSID) {
                alert('SSID cannot be empty');
                return;
            }

            const parameters = {};
            parameters[ssidPath] = newSSID;
            if (newPass && passPath) {
                parameters[passPath] = newPass;
            }

            const payload = {
                name: "SetParameterValues",
                payload: { parameters: parameters }
            };

            try {
                const response = await fetch(`${API_BASE}/tasks?sn=${encodeURIComponent(sn)}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', ...getHeaders() },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    alert('WiFi configuration task queued successfully!');
                    wifiModal.hide();
                } else {
                    const text = await response.text();
                    alert(`Failed: ${text}`);
                }
            } catch (error) {
                console.error('Error saving wifi config:', error);
                alert('Error sending request');
            }
        }

        async function rebootDevice(sn) {
            if (!confirm(`Are you sure you want to REBOOT device ${sn}?`)) return;

            const payload = { name: "Reboot", payload: {} };

            try {
                const response = await fetch(`${API_BASE}/tasks?sn=${encodeURIComponent(sn)}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', ...getHeaders() },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    alert('Reboot command queued successfully!');
                } else {
                    const text = await response.text();
                    alert(`Failed: ${text}`);
                }
            } catch (error) {
                console.error('Error rebooting device:', error);
                alert('Error sending request');
            }
        }

        async function refreshDevice(sn, btn) {
            if (!confirm(`Are you sure you want to refresh device ${sn}?`)) return;
            
            // Store original icon
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            btn.disabled = true;

            try {
                const response = await fetch(`${API_BASE}/refresh?sn=${encodeURIComponent(sn)}`, {
                    method: 'POST',
                    headers: getHeaders()
                });
                
                if (response.ok) {
                    alert('Connection Request sent successfully!');
                } else {
                    const text = await response.text();
                    alert(`Failed: ${text}`);
                }
            } catch (error) {
                console.error('Error refreshing device:', error);
                alert('Error sending request');
            } finally {
                btn.innerHTML = originalHtml;
                btn.disabled = false;
            }
        }

        // Initial Load
        function loadData() {
            fetchStats();
            fetchDevices();
        }
        
        // Auto refresh stats every 30 seconds
        setInterval(fetchStats, 30000);
    </script>
</body>
</html>
